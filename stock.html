<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Mercado do Bairro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Gestão de Estoque</h1>
        <button onclick="window.location.href='index.html'">Voltar</button>

        <!-- Adicionar Produto -->
        <h2>Adicionar Produto</h2>
        <form id="produtoForm">
            <input type="text" id="nomeProduto" placeholder="Nome do Produto" required>
            <input type="text" id="descricao" placeholder="Descrição" required>
            <input type="number" id="preco" placeholder="Preço" step="0.01" required>
            <input type="number" id="quantidade" placeholder="Quantidade" required>
            <button type="submit">Adicionar</button>
        </form>

        <!-- Tabela de Estoque -->
        <h2>Estoque</h2>
        <div id="estoque"></div>

        <!-- Pedidos -->
        <h2>Pedidos</h2>
        <div id="pedidos"></div>

        <!-- Mensagem Fixada -->
        <h2>Mensagem Fixada no Chat</h2>
        <input type="text" id="mensagemFixada" placeholder="Ex.: Pagamento via Pix: 12345">
        <button onclick="salvarMensagemFixada()">Salvar Mensagem</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
