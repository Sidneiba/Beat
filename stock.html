<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Mercado do Bairro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Gestão de Estoque</h1>
        <button onclick="window.location.href='old_index.html'"><i class="fas fa-arrow-left"></i> Voltar</button>
        <button onclick="window.location.href='caixa.html'"><i class="fas fa-cash-register"></i> Ir para o Caixa</button>

        <!-- Adicionar Produto -->
        <h2>Adicionar Produto</h2>
        <form id="produtoForm">
            <input type="text" id="nomeProduto" placeholder="Nome do Produto" required>
            <input type="text" id="tipoProduto" placeholder="Tipo (ex.: Branco, Integral)" required>
            <input type="text" id="volumeProduto" placeholder="Volume (ex.: 5kg, 1L)" required>
            <input type="text" id="marcaProduto" placeholder="Marca" required>
            <input type="text" id="codigoProduto" placeholder="Código (ex.: COD101)" required>
            <input type="number" id="quantidadeProduto" placeholder="Quantidade" required>
            <input type="number" id="precoProduto" placeholder="Preço" step="0.01" required>
            <button type="submit"><i class="fas fa-plus"></i> Adicionar</button>
        </form>

        <!-- Estoque -->
        <div id="estoque"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
