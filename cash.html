<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado do Bairro - Caixa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #E0F7E0; color: #333; font-family: Arial, sans-serif; padding: 20px; }
        #cash-container { background-color: #E0F7E0; padding: 20px; border: 3px solid #FFC107; border-radius: 5px; }
        .inner-border { border: 2px solid #D8BFD8; padding: 15px; border-radius: 5px; }
        table { width: 100%; margin-top: 20px; }
        th, td { padding: 10px; text-align: center; }
        th { background-color: #007BFF; color: #fff; }
        .negative { color: #DC3545; }
        .btn-confirm { background-color: #28A745; color: #fff; }
        .btn-cancel { background-color: #DC3545; color: #fff; }
        .btn-neutral { background-color: #007BFF; color: #fff; }
    </style>
</head>
<body>
    <div id="cash-container">
        <div class="inner-border">
            <h2>Gestão de Caixa</h2>
            <div class="mb-3">
                <input type="text" id="cash-desc" class="form-control d-inline-block w-50" placeholder="Descrição (ex.: Venda de leite)">
                <input type="number" id="cash-amount" class="form-control d-inline-block w-25" placeholder="Valor" step="0.01">
                <button class="btn btn-confirm" onclick="addCashEntry('entrada')">Entrada</button>
                <button class="btn btn-cancel" onclick="addCashEntry('saida')">Saída</button>
            </div>
            <table id="cash-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Entrada</th>
                        <th>Saída</th>
                        <th>Saldo</th>
                    </tr>
                </thead>
                <tbody id="cash-body"></tbody>
            </table>
            <p class="mt-3">Saldo Total: <span id="cash-balance">R$ 0.00</span></p>
            <a href="store.html" class="btn btn-neutral mt-3">Voltar para Estoque</a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
