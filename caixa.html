<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="/manifest.json">    
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - Mercado do Bairro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Caixa</h1>
        <button onclick="window.location.href='old_index.html'"><i class="fas fa-arrow-left"></i> Voltar</button>
        <button onclick="window.location.href='stock.html'"><i class="fas fa-warehouse"></i> Ir para o Estoque</button>

        <!-- Pedidos -->
        <div id="pedidos" class="history-frame"></div>
        <button id="deleteHistoryBtn" class="delete-btn"><i class="fas fa-trash"></i> Deletar</button>
        <div id="confirmDialog" class="confirm-dialog">
            <p>Você quer realmente apagar esse registro?</p>
            <button id="confirmYes">Sim</button>
            <button id="confirmNo">Não</button>
        </div>

        <!-- Mensagem Fixada -->
        <h2>Mensagem Fixada no Chat</h2>
        <input type="text" id="mensagemFixada" placeholder="Ex.: Pagamento via Pix: 12345">
        <button onclick="salvarMensagemFixada()"><i class="fas fa-thumbtack"></i> Salvar</button>

        <!-- Chat com Cliente -->
        <h2>Chat com Clientes</h2>
        <select id="clienteChat" onchange="exibirChat()">
            <option value="">Selecione um cliente</option>
        </select>
        <div id="chat" class="chat-box"></div>
        <input type="text" id="mensagemInput" placeholder="Digite sua resposta">
        <button id="enviarMensagem"><i class="fas fa-paper-plane"></i> Enviar</button>

        <!-- Botão de Simulação -->
        <h2>Simulação</h2>
        <button onclick="simularCompraCliente()">Simular Compra como Cliente</button>
    </div>
    <script src="app.js"></script>
    <script>
        function salvarMensagemFixada() {
            const mensagem = document.getElementById("mensagemFixada").value;
            const usuario = JSON.parse(localStorage.getItem("usuarioAtual"));
            mensagensFixadas[usuario.nome] = mensagem;
            localStorage.setItem("mensagensFixadas", JSON.stringify(mensagensFixadas));
            alert("Mensagem fixada salva!");
            exibirChat();
        }
    </script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker registrado!'))
            .catch(err => console.error('Erro ao registrar Service Worker:', err));
    }
</script>
</body>
</html>
