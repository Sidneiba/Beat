<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #333; /* Fundo escuro do chat */
            font-family: 'Roboto', sans-serif;
            border: 10px solid #50C878; /* Borda verde esmeralda */
        }
        .title {
            font-size: 64px;
            color: #ADFF2F; /* Verde claro vibrante do chat */
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            animation: fadeIn 10s ease-in-out; /* Animação de 10 segundos */
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5); /* Contorno escuro */
        }
        .location {
            font-size: 36px;
            color: #DDA0DD; /* Roxo do chat */
            text-align: center;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); /* Contorno escuro */
        }
        .developer {
            font-size: 20px;
            color: #ADFF2F; /* Verde claro */
            text-align: center;
            font-weight: 700;
            opacity: 0.8; /* Leve transparência */
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5); /* Contorno escuro */
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-50px); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="title">Bem-vindo ao Mercado do Bairro</div>
    <div class="location">Sinop MT-Brasil</div>
    <div class="developer">Sidnei Batista Correia - desenvolvedor</div>
    <audio autoplay>
        <source src="https://www.bensound.com/bensound-music/bensound-sweet.mp3" type="audio/mp3">
    </audio>
    <script>
        setTimeout(() => {
            window.location.href = "index.html";
        }, 10000); // 10 segundos
    </script>
</body>
</html>
