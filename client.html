<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras - Mercado do Bairro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Compras</h1>
        <button onclick="window.location.href='index.html'">Voltar</button>

        <!-- Escolha de Loja -->
        <h2>Escolha uma Loja</h2>
        <select id="lojaEscolhida" onchange="selecionarLoja()">
            <option value="">Selecione uma loja</option>
        </select>

        <!-- Catálogo de Produtos -->
        <h2>Catálogo</h2>
        <div id="catalogo"></div>

        <!-- Carrinho de Compras -->
        <h2>Carrinho</h2>
        <div id="carrinho"></div>
        <button onclick="realizarCheckout()">Finalizar Compra</button>

        <!-- Chat -->
        <h2>Chat com Lojista</h2>
        <div id="chat" class="chat-box"></div>
        <input type="text" id="mensagemInput" placeholder="Digite sua mensagem">
        <button id="enviarMensagem">Enviar Texto</button>
        <button id="enviarAudio">Enviar Áudio</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
