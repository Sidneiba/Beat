<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras - Mercado do Bairro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Compras</h1>
        <button onclick="window.location.href='old_index.html'"><i class="fas fa-arrow-left"></i> Voltar</button>

        <!-- Escolha de Loja -->
        <h2>Escolha uma Loja</h2>
        <select id="lojaEscolhida" onchange="selecionarLoja()">
            <option value="">Selecione uma loja</option>
        </select>

        <!-- Catálogo de Produtos -->
        <h2>Catálogo</h2>
        <div id="catalogo"></div>

        <!-- Carrinho de Compras -->
        <h2>Carrinho</h2>
        <div id="carrinho"></div>
        <button onclick="realizarCheckout()"><i class="fas fa-check"></i> Finalizar Compra</button>

        <!-- Histórico de Compras -->
        <div id="purchaseHistory" class="history-frame"></div>
        <button id="deleteHistoryBtn" class="delete-btn"><i class="fas fa-trash"></i> Deletar</button>
        <div id="confirmDialog" class="confirm-dialog">
            <p>Você quer realmente apagar esse registro?</p>
            <button id="confirmYes">Sim</button>
            <button id="confirmNo">Não</button>
        </div>

        <!-- Chat -->
        <h2>Chat com Lojista</h2>
        <div id="chat" class="chat-box"></div>
        <input type="text" id="mensagemInput" placeholder="Digite sua mensagem">
        <button id="enviarMensagem"><i class="fas fa-paper-plane"></i> Enviar</button>
        <button id="enviarAudio"><i class="fas fa-microphone"></i> Enviar Áudio</button>
    </div>
    <script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker registrado!'))
            .catch(err => console.error('Erro ao registrar Service Worker:', err));
    }
</script>
</body>
</html>
