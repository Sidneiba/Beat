<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado do Bairro - Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #E0F7E0; color: #333; font-family: Arial, sans-serif; }
        .container { background-color: #E0F7E0; padding: 20px; border: 3px solid #FFC107; border-radius: 5px; margin-top: 20px; }
        .inner-border { border: 2px solid #D8BFD8; padding: 15px; border-radius: 5px; }
        .btn-confirm { background-color: #28A745; color: #fff; }
        .btn-cancel { background-color: #DC3545; color: #fff; }
        .btn-neutral { background-color: #007BFF; color: #fff; }
        #store-list, #catalog, #cart { margin-bottom: 20px; }
        .store-item, .product-item, .cart-item { padding: 10px; border-bottom: 1px solid #D8BFD8; cursor: pointer; }
        .store-item:hover, .product-item:hover, .cart-item:hover { background-color: #D8BFD8; }
        #catalog, #cart { display: none; }
        .total { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="inner-border">
            <h2>Bem-vindo, <span id="username"></span>!</h2>
            <div id="store-list">
                <h3>Lojas Disponíveis</h3>
                <!-- Lista de lojas será preenchida pelo JS -->
            </div>
            <div id="catalog">
                <h3>Catálogo da Loja: <span id="selected-store"></span></h3>
                <div id="product-list"></div>
                <div class="mt-3">
                    <input type="text" id="product-name" class="form-control d-inline-block w-50" placeholder="Nome do produto">
                    <input type="number" id="product-qty" class="form-control d-inline-block w-25" placeholder="Quantidade" min="1">
                    <button class="btn btn-confirm" onclick="addProductManual()">Adicionar</button>
                </div>
            </div>
            <div id="cart">
                <h3>Carrinho</h3>
                <div id="cart-items"></div>
                <p class="total">Total: R$ <span id="cart-total">0.00</span></p>
                <button id="pay-btn" class="btn btn-cancel" onclick="sendToChat()" disabled>Pagar</button>
                <p id="pay-warning" class="text-muted">Confirme a compra pelo chat para pagar!</p>
            </div>
            <a href="chat.html" class="btn btn-neutral mt-3">Ir para o Chat</a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
