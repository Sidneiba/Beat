<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado do Bairro - Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #E0F7E0; color: #333; font-family: Arial, sans-serif; }
        .container { background-color: #E0F7E0; padding: 20px; border: 3px solid #FFC107; border-radius: 5px; margin-top: 20px; }
        .inner-border { border: 2px solid #D8BFD8; padding: 15px; border-radius: 5px; }
        .btn-confirm { background-color: #28A745; color: #fff; }
        .btn-cancel { background-color: #DC3545; color: #fff; }
        .btn-neutral { background-color: #007BFF; color: #fff; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #D8BFD8; padding: 10px; background-color: #fff; margin-bottom: 10px; }
        .message { margin: 5px 0; padding: 5px; }
        .user { text-align: right; color: #007BFF; }
        .bot { text-align: left; color: #28A745; }
        .audio-message { padding: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="inner-border">
            <h2>Chat - Mercado do Bairro</h2>
            <div id="messages"></div>
            <div class="input-group mb-3">
                <input type="text" id="chat-input" class="form-control" placeholder="Digite sua mensagem">
                <button class="btn btn-confirm" onclick="sendMessage()">Enviar</button>
            </div>
            <div>
                <button id="record-btn" class="btn btn-neutral" onclick="startRecording()">Gravar Áudio</button>
                <button id="stop-btn" class="btn btn-cancel" onclick="stopRecording()" disabled>Parar</button>
                <a href="client.html" class="btn btn-neutral">Voltar ao Painel</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
