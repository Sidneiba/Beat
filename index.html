<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #333;
            font-family: 'Roboto', sans-serif;
            border: 10px solid #50C878;
        }
        .title {
            font-size: 64px;
            color: #ADFF2F;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
        }
        .location {
            font-size: 36px;
            color: #DDA0DD;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }
        .developer {
            font-size: 20px;
            color: #ADFF2F;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            opacity: 0.8;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
        }
        .enter-btn {
            padding: 15px 30px;
            font-size: 24px;
            font-weight: 700;
            color: #333;
            background-color: #ADFF2F;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        .enter-btn:hover {
            background-color: #DDA0DD;
        }
    </style>
</head>
<body>
    <div class="title">Bem-vindo ao Mercado do Bairro</div>
    <div class="location">Sinop MT-Brasil</div>
    <div class="developer">Sidnei Batista Correia - desenvolvedor</div>
    <button class="enter-btn" onclick="window.location.href='old_index.html'">Entrar</button>
    <audio autoplay loop>
        <source src="welcome.mp3" type="audio/mp3">
    </audio>
</body>
</html>
